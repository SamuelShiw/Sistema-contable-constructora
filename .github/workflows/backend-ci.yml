name: Backend CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_DB: constructora_test_db
          POSTGRES_USER: constructora_user
          POSTGRES_PASSWORD: constructora_password

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U constructora_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: constructora_test_db
      DATABASE_USER: constructora_user
      DATABASE_PASSWORD: constructora_password

      SECRET_KEY: test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

      APP_NAME: Sistema Contable Constructora
      APP_ENV: testing
      APP_VERSION: 1.0.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          alembic upgrade head

      - name: Run tests
        run: |
          pytest